  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-weight:500;margin-bottom:52px;max-width:540px\">Everything between a drawing and a doorway.<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:0\" class=\"mv-what-grid\">\n      <div style=\"padding:0 36px 0 0;border-right:1px solid #D8D3C6\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#9A9486;margin-bottom:18px\">01<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-size:23px;font-weight:500;letter-spacing:-.01em;margin-bottom:11px\">Permit Drawing Set<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.6;color:#54594D\">Construction drawings, ready to submit to your local building department.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:0 36px;border-right:1px solid #D8D3C6\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#9A9486;margin-bottom:18px\">02<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-size:23px;font-weight:500;letter-spacing:-.01em;margin-bottom:11px\">Material Package<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.6;color:#54594D\">A curated kit of structural materials and finishes, sourced direct and shipped to site.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:0 0 0 36px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:12px;color:#9A9486;margin-bottom:18px\">03<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-size:23px;font-weight:500;letter-spacing:-.01em;margin-bottom:11px\">Custom Consultation<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.6;color:#54594D\">Adapt any plan to your lot, climate and budget with our modular design team.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOW IT WORKS -->\n  <section id=\"how\" style=\"border-top:1px solid #E2DDD0;border-bottom:1px solid #E2DDD0;background:#EDE8DB\">\n    <div style=\"max-width:1280px;margin:0 auto;padding:88px 40px\" class=\"mv-container mv-vpad\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:#B16A45;margin-bottom:16px\">— How it works<\u002Fdiv>\n      <h2 style=\"font-family:'Spectral',serif;font-size:clamp(28px,3.6vw,42px);line-height:1.08;letter-spacing:-.02em;font-weight:500;margin-bottom:18px;max-width:640px\">Your path from reservation to move-in ready.<\u002Fh2>\n      <p style=\"font-size:16.5px;line-height:1.6;color:#54594D;max-width:560px;margin-bottom:40px\">A predictable, engineered prefab process — here's every phase, what it costs to begin, and roughly how long it takes.<\u002Fp>\n\n      <!-- total timeline banner -->\n      <div style=\"background:#2F4A38;border-radius:14px;padding:20px 30px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:72px\">\n        <span style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:#A9B7AC\">Estimated total timeline<\u002Fspan>\n        <span style=\"font-family:'Spectral',serif;font-size:clamp(18px,2vw,23px);font-weight:500;color:#F6F3EC\">As fast as 20 weeks, reservation to move-in ready<\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- timeline -->\n      <div style=\"position:relative;max-width:1060px;margin:0 auto\">\n        <div style=\"position:absolute;left:50%;top:6px;bottom:6px;width:2px;background:#D3CDBE;transform:translateX(-50%)\" class=\"mv-timeline-line\"><\u002Fdiv>\n\n        <!-- Step 1 (left) -->\n        <div style=\"display:grid;grid-template-columns:1fr 56px 1fr;align-items:start;margin-bottom:10px\" class=\"mv-timeline-step\">\n          <div style=\"padding:0 42px 48px 0\">\n            <div style=\"max-width:440px;margin-left:auto;text-align:right\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:#B16A45;margin-bottom:12px\">1 WEEK · FREE<\u002Fdiv>\n              < tep 2 (right) -->\n        <div style=\"display:grid;grid-template-columns:1fr 56px 1fr;align-items:start;margin-bottom:10px\" class=\"mv-timeline-step\">\n          <div><\u002Fdiv>\n          <div style=\"display:flex;justify-content:center\"><div style=\"width:42px;height:42px;border-radius:50%;background:#2F4A38;color:#F6F3EC;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;border:4px solid #EDE8DB;position:relative;z-index:2\">2<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:0 0 48px 42px\">\n            <div style=\"max-width:440px;margin-right:auto;text-align:left\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:#B16A45;margin-bottom:12px\">3–5 WEEKS<\u002Fdiv>\n              <h3 style=\"font-family:'Spectral',serif;font-size:23px;font-weight:500;letter-spacing:-.01em;color:#20251F;line-height:1.15;margin-bottom:12px\">Design &amp; Permit set<\u002Fh3>\n              <span style=\"display:inline-block;font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.02em;color:#9A5A3C;background:#F1E5DC;border:1px solid #E3CBBB;border-radius:7px;padding:6px 12px;margin-bottom:14px\">25% deposit due to begin<\u002Fspan>\n              <p style=\"font-size:15px;line-height:1.6;color:#54594D\">With your deposit placed, we adapt the design to your site. One round of free revisions fine-tune layout, orientation and finishes. You finish this phase with a complete permit-ready set to submit to your building department.<\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-start;margin-top:16px\">\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Free design revision<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Permit-ready drawing set<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Jurisdiction-specific code guidance<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Permitting support<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Step 3 (left) -->\n        <div style=\"display:grid;grid-template-columns:1fr 56px 1fr;align-items:start;margin-bottom:10px\" class=\"mv-timeline-step\">\n          <div style=\"padding:0 42px 48px 0\">\n            <div style=\"max-width:440px;margin-left:auto;text-align:right\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:#B16A45;margin-bottom:12px\">Varies by jurisdiction<\u002Fdiv>\n              <h3 style=\"font-family:'Spectral',serif;font-size:23px;font-weight:500;letter-spacing:-.01em;color:#20251F;line-height:1.15;margin-bottom:12px\">Permit submission<\u002Fh3>\n              <p style=\"font-size:15px;line-height:1.6;color:#54594D\">Using your stamped permit set submits for a building permit. Timelines vary by local building department — we provide guidance throughout and stay available for any questions that come up during review.<\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end;margin-top:16px\">\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Owner / local architect arranges<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">We provide full consulting support<\u002Fspan>\ itectural glazing, doors, and curated finish options. We compress the traditional construction timeline. Your completed structural kit is delivered directly to the site—fully cataloged and ready to assemble.<\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-start;margin-top:16px\">\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Full kit prefabrication<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Shipping &amp; logistics coordination<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Site work runs in parallel<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Delivery to your door<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Step 5 (left) -->\n        <div style=\"display:grid;grid-template-columns:1fr 56px 1fr;align-items:start;margin-bottom:10px\" class=\"mv-timeline-step\">\n          <div style=\"padding:0 42px 48px 0\">\n            <div style=\"max-width:440px;margin-left:auto;text-align:right\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:#B16A45;margin-bottom:12px\">1–3 weeks<\u002Fdiv>\n              <h3 style=\"font-family:'Spectral',serif;font-size:23px;font-weight:500;letter-spacing:-.01em;color:#20251F;line-height:1.15;margin-bottom:12px\">Shell assembly<\u002Fh3>\n              <p style=\"font-size:15px;line-height:1.6;color:#54594D\">The SIPs system is engineered for speed. A skilled crew can stand the structural shell — walls, roof, windows and exterior doors — in as little as one day for a compact footprint. The full weathertight shell is typically complete within one to three weeks.<\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-end;margin-top:16px\">\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">SIPs panel assembly<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Roofing installation<\u002Fspan>\n                <span style=\"font-size: 12px; color: #4A4F44; border: 1px solid #D8D3C6; border-radius: 100px; padding: 5px 11px; background-color: #F3EFE6\">Window &amp; door install<\u002Fspan>\n                <span style=\"font-size: 12px; color: #2F4A38; border: 1px solid #CBD8C6; border-radius: 100px; padding: 5px 11px; background-color: #F3EFE6\">Weathertight shell in days<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:center\"><div style=\"width:42px;height:42px;border-radius:50%;background:#2F4A38;color:#F6F3EC;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;border:4px solid #EDE8DB;position:relative;z-index:2\">5<\u002Fdiv><\u002Fdiv>\n          <div><\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Step 6 (right) -->\n        <div style=\"display:grid;grid-template-columns:1fr 56px 1fr;align-items:start\" class=\"mv-timeline-step\">\n          <div><\u002Fdiv>\n          <div style=\"display:flex;justify-content:center\"><div style=\"width:42px;height:42px;border-radius:50%;background:#B16A45;color:#F6F3EC;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;border:4px solid #EDE8DB;position:relative;z-index:2\">6<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:0 0 4px 42px\">\n            <div style=\"max-width:440px;margin-right:auto;text-align:left\">\n              <div style=\"font-family:'Space Mono',monospace;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:#B16A45;margin-bottom:12px\">8–16 weeks<\u002Fdiv>\n              <h3 style=\"font-family:'Spectral',serif;font-size:23px;font-weight:500;letter-spacing:-.01em;color:#20251F;line-height:1.15;margin-bottom:12px\">Interior &amp; Systems<\u002Fh3>\n              <p style=\"font-size:15px;line-height:1.6;color:#54594D\">Your GC completes the interior — MEP systems (electrical, plumbing, HVAC), appliances, finishes and utilities hookup. We provide consulting support throughout. At the end of this phase, your home is ready to live in.<\u002Fp>\n              <div style=\"display:flex;flex-wrap:wrap;gap:7px;justify-content:flex-start;margin-top:16px\">\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">MEP &amp; appliances: local contractor<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Interior finishes from your kit<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">Utilities hookup<\u002Fspan>\n                <span style=\"font-size:12px;color:#4A4F44;background:#F3EFE6;border:1px solid #D8D3C6;border-radius:100px;padding:5px 11px\">We consult throughout<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n\n      <p style=\"max-width:780px;margin:60px auto 0;text-align:center;font-size:13px;line-height:1.65;color:#9A9486\">Timeline estimates reflect typical projects under standard conditions. Actual duration varies with contractor availability, local permitting timelines, site conditions and design complexity — we'll give you a project-specific estimate during your site analysis.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WHY US — full-bleed split -->\n  <section id=\"why\" style=\"display:grid;grid-template-columns:1fr 1fr;align-items:stretch\" class=\"mv-why-section\">\n    <div style=\"background: #E7E2D6; min-height: 560px; height: 548px\" class=\"mv-why-media\">\n      <x-import component-from-global-scope=\"image-slot\" from=\"6743eaf6-0220-4d77-8199-8da1c935a350#/image-slot.js\" id=\"why-render\" src=\"https://i.ibb.co/xq53v70r/Studio-Exterior-View-3-2.jpg\" placeholder=\"Why Modular — render\" radius=\"0\" style=\"width: 699px; height: 562px; min-height: 560px\" hint-size=\"100%,560px\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;justify-content:center;padding:72px 56px\" class=\"mv-why-content\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:#B16A45;margin-bottom:16px\">— Why Modular<\u002Fdiv>\n      <h2 style=\"font-family:'Spectral',serif;font-size:clamp(28px,3.2vw,40px);line-height:1.08;letter-spacing:-.02em;font-weight:500;margin-bottom:34px\">Designed to pencil out.<\u002Fh2>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:30px 36px\" class=\"mv-why-items\">\n        <div>\n          <h3 style=\"font-size:17px;font-weight:600;margin-bottom:8px\">A real cost advantage<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#54594D\">Pre-engineered plans and direct-sourced materials cut the biggest line items before you break ground.<\u002Fp>\n        <\u002Fdiv>\n        <div>\n          <h3 style=\"font-size:17px;font-weight:600;margin-bottom:8px\">Contemporary design<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.55;color:#54594D\">Architect-led layouts and rooflines that look intentional  class=\"mv-container mv-vpad mv-footer-grid\">\n      <div>\n        <div style=\"margin-bottom:14px\">\n          <img src=\"156eaea2-dcd8-415b-9da7-ec0ea922fc52\" alt=\"MAVE\" style=\"width:102px;height:25px;display:block\">\n        <\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.55;color:#7C7868;max-width:280px\">Architect-designed small homes, delivered as build-ready plans, permits and materials.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9A9486;margin-bottom:16px\">Plans<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14.5px;color:#4A4F44\"><a href=\"Side%20Page_Hearth%20Studio.dc.html\" style=\"text-decoration:none\">Hearth · Studio<\u002Fa><a href=\"Side%20Page_Grove%20Loft.dc.html\" style=\"text-decoration:none\">Grove ·&nbsp;Studio<\u002Fa><a href=\"Side%20Page_Hearth%20One%20Bedroom.dc.html\" style=\"text-decoration:none\">Hearth · One Bedroom<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9A9486;margin-bottom:16px\">Company<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14.5px;color:#4A4F44\"><a href=\"#how\" style=\"text-decoration:none\">How it works<\u002Fa><a href=\"#why\" style=\"text-decoration:none\">Why Modular<\u002Fa><a href=\"#faq\" style=\"text-decoration:none\">FAQ<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#9A9486;margin-bottom:16px\">Contact<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14.5px;color:#4A4F44\"><span>mavebuild.contact@gmail.com<\u002Fspan><a href=\"#contact\" style=\"text-decoration:none\">Portland, OR, 97205<br>New York City, NY, 10001<\u002Fa><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1280px;margin:0 auto;padding:22px 40px;border-top:1px solid #E2DDD0;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:13px;color:#9A9486\" class=\"mv-container\">\n      <span>© 2026 MAVE, Inc.<\u002Fspan>\n      <div style=\"display:flex;gap:24px\"><span>Privacy<\u002Fspan><span>Terms<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showPrices&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showTrust&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = { open: 0, aduOpen: false, scrolled: false, contactOpen: false, contactStep: 'menu', feasOwn: '', feasPropType: '', feasUnit: '', feasTimeline: '', msgProduct: '', mobileMenuOpen: false };\n  _submitToFormspree(form) {\n    return fetch(form.action, { method: 'POST', body: new FormData(form), headers: { 'Accept': 'application/json' } });\n  }\n  componentDidMount() {\n    this._onScroll = () => { const s = window.scrollY > 30; if (s !== this.state.scrolled) this.setState({ scrolled: s }); };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this._onScroll();\n    if (window.location.hash) {\n      const id = window.location.hash.slice(1);\n      const tryScroll = (attempts) => {\n        const el = document.getElementById(id);\n        if (el) {\n          window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' });\n        } else if (attempts > 0) {\n          setTimeout(() => tryScroll(attempts - 1), 120);\n        }\n      };\n      setTimeout(() => tryScroll(15), 60);\n    }\n  }\n  componentWillUnmount() { window.removeEventListener('scroll', this._onScroll); }\n  renderVals() {\n    const scrolled = this.state.scrolled;\n    const navStyle = \"position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;padding:17px 40px;pointer-events:auto;transition:background-color .35s ease, backdrop-filter .35s ease, border-color .35s ease;border-bottom:1px solid \" + (scrolled ? \"rgba(59,54,48,.14)\" : \"#2f4836eb\") + \";\" + (scrolled ? \"background-color:rgba(243,239,230,.72);backdrop-filter:blur(14px) saturate(1.08);-webkit-backdrop-filter:blur(14px) saturate(1.08);\" : \"background-color:#3B3630;backdrop-filter:none;-webkit-backdrop-filter:none;\");\n    const navText = scrolled ? '#3B3630' : '#f3efe6';\n    const logoBrownOpacity = scrolled ? 1 : 0;\n    const ctaStyle = \"font-size:14px;font-weight:600;padding:10px 18px;border-radius:6px;text-decoration:none;transition:background-color .35s ease, color .35s ease;\" + (scrolled ? \"background-color:#3B3630;color:#f3efe6;\" : \"background-color:#f3efe6;color:#3b5444;\");\n    const menuBase = \"position:absolute;top:100%;left:0;right:0;width:100%;background:#3B3630;padding:42px 40px 46px;display:flex;justify-content:center;align-items:stretch;gap:0;z-index:59;box-shadow:0 26px 40px -22px rgba(0,0,0,.45);transition:opacity .22s ease, transform .22s ease;\";\n    const aduMenuStyle = this.state.aduOpen\n      ? menuBase + \"opacity:1;visibility:visible;transform:translateY(0);\"\n      : menuBase + \"opacity:0;visibility:hidden;pointer-events:none;transform:translateY(-12px);\";\n    const data = [\n      { q: \"Which areas do you serve?\", a: \"We currently accept projects in New York, New Jersey, Oregon, Washington, Florida, and California. Each project begins with a free site feasibility review where we confirm local code requirements and project viability for your specific jurisdiction. If you're outside these areas, reach out — we're expanding and may be able to accommodate your project on a case-by-case basis.\" },\n      { q: \"What's included in the package?\", a: \"Your package includes design & engineering with one free design revision cycle, stamped permit-ready drawing sets, full-build construction consulting, general contractor training, construction kit shipping (NY, NJ, OR, CA, WA), the SIPs structural panel kit and steel + insulation interior framing, windows and exterior doors, and weatherproofing and functional membranes. Roofing, siding, interior finishes, flooring, door & trim, and kitchen, storage, and bathroom casework are available as optional add-ons, and permitting submission can be handled on your behalf.\" },\n      { q: \"What's not included?\", a: \"The package does not include foundation and site work, on-site construction, utilities hookups, or MEP systems (electrical, plumbing, HVAC). Interior finish and casework installation and lighting fixtures are also handled on site rather than included in the kit. These are coordinated by your local general contractor — we provide consulting support throughout.\" },\n      { q: \"Can I customize the design?\", a: \"Yes, within reason. Every package includes one cycle free design revision to adapt the plan to your site and preferences. Standard customizations include mirroring the floor plan, minor window repositioning, adding or removing windows, and entry door configuration (single or double, with an optional full-height glazing system). Structural changes that affect the SIPs panel layout may require additional engineering review and are quoted separately. Our team will advise during your feasibility review what's possible within your budget.\" },\n      { q: \"Do I need my own contractor?\", a: \"Yes — we supply the kit, and on-site construction is coordinated by a local general contractor. You're not on your own finding one, though: we maintain a network of trusted local general contractors, architects, and structural engineers who are familiar with our building system, and we can connect you and help coordinate throughout your build.\" },\n      { q: \"How long does the whole process take?\", a: \"From your initial reservation to move-in, most projects complete in 20–40 weeks. The largest variable is local permitting, which varies significantly by jurisdiction. Factory fabrication and delivery takes 14–16 weeks once production begins. Shell assembly with the SIPs system typically takes 1–3 weeks on site — significantly faster than traditional stick framing. Your feasibility review will include a project-specific timeline estimate based on your location and design.\" },\n      { q: \"How does payment work?\", a: \"Projects are initiated with a 25% deposit of the total package price, which begins the design and permitting phase. The remaining balance is paid in two installments: 50% to enter factory production, and 25% prior to shipping. Deposits are fully refundable within 7 days of payment with no questions asked. After 7 days, deposits are non-refundable but transferable — you may apply the full deposit toward a different floor plan or defer your project start date by up to 12 months. Cancellations after production has commenced are non-refundable.\" },\n      { q: \"Do I need to hire my own architect?\", a: \"In most cases, no. We provide complete permit-ready drawings as part of our service. These construction documents include the specifications your local contractor needs to build the project according to the design.\\n\\nFor most states we serve, we also provide stamped drawings. If your project is located in an area outside our stamping service coverage, we can connect you with one of the architects in our trusted network to review and complete the required stamping for your permit application.\" },\n      { q: \"Why build with SIPs?\", a: \"Structural Insulated Panels (SIPs) offer three key advantages over conventional stick framing. First, energy efficiency: SIPs provide continuous insulation with no thermal bridging, reducing heating and cooling loads by up to 60% compared to standard 2×6 stud construction. Second, speed: because panels arrive pre-cut and numbered, a skilled crew can stand the structural shell of a compact build in as little as one day. Third, structural strength: the composite panel system creates a rigid, airtight envelope that outperforms stud framing in wind and load resistance — important for both ADU and retreat applications.\" }\n    ];\n    const buildOptions = (options, selected, setter) => options.map(label => ({\n      label,\n      style: \"padding:9px 15px;border-radius:100px;border:1px solid \" + (selected === label ? \"#2F4A38\" : \"#D8D3C6\") + \";background:\" + (selected === label ? \"#2F4A38\" : \"#FFFFFF\") + \";color:\" + (selected === label ? \"#F3EFE6\" : \"#54594D\") + \";font-size:13.5px;font-family:'Schibsted Grotesk',system-ui,sans-serif;cursor:pointer;white-space:nowrap;transition:background .15s ease, color .15s ease, border-color .15s ease\",\n      onClick: () => setter(label)\n    }));\n    const feasOwnOptions = buildOptions(['Yes', 'Not yet', 'Renting'], this.state.feasOwn, v => this.setState({ feasOwn: v }));\n    const feasPropTypeOptions = buildOptions(['Single-family lot', 'Multi-family', 'Land only'], this.state.feasPropType, v => this.setState({ feasPropType: v }));\n    const feasUnitOptions = buildOptions(['Hearth Studio', 'Grove Studio', 'Hearth 1B1B', 'Not sure yet'], this.state.feasUnit, v => this.setState({ feasUnit: v }));\n    const feasTimelineOptions = buildOptions(['ASAP', '3–6 months', '6–12 months', 'Just exploring'], this.state.feasTimeline, v => this.setState({ feasTimeline: v }));\n    const msgProductOptions = buildOptions(['Hearth Studio', 'Grove Studio', 'Hearth 1B1B', 'General question'], this.state.msgProduct, v => this.setState({ msgProduct: v }));\n    const inputStyle = \"width:100%;padding:13px 14px;border-radius:8px;border:1px solid #D8D3C6;background:#FFFFFF;color:#20251F;font-size:14.5px;font-family:'Schibsted Grotesk',system-ui,sans-serif;outline:none\";\n    const inputStyleFull = inputStyle + \";margin-bottom:10px\";\n    const textareaStyle = inputStyle + \";resize:vertical;font-family:'Schibsted Grotesk',system-ui,sans-serif\";\n    const submitStyle = \"margin-top:4px;width:100%;padding:15px 20px;border-radius:8px;border:none;background:#2F4A38;color:#F3EFE6;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s ease\";\n    const backBtnStyle = \"position:absolute;top:22px;left:44px;display:inline-flex;align-items:center;gap:6px;border:none;background:transparent;color:#9A9486;font-size:14px;font-weight:500;cursor:pointer;padding:4px 2px\";\n    const contactStep = this.state.contactStep;\n    const isMenu = contactStep === 'menu';\n    const isFeasibility = contactStep === 'feasibility';\n    const isMessage = contactStep === 'message';\n    const isDone = contactStep === 'done-feasibility' || contactStep === 'done-message';\n    const showBack = isFeasibility || isMessage;\n    const feasSubmitting = !!this.state.feasSubmitting;\n    const msgSubmitting = !!this.state.msgSubmitting;\n    const feasError = !!this.state.feasError;\n    const msgError = !!this.state.msgError;\n    const feasSubmitLabel = feasSubmitting ? 'Sending…' : 'Request my free feasibility study';\n    const msgSubmitLabel = msgSubmitting ? 'Sending…' : 'Send message';\n    const openContact = (e) => { if (e) e.preventDefault(); this.setState({ contactOpen: true, contactStep: 'menu' }); };\n    const toggleMobileMenu = () => this.setState(s => ({ mobileMenuOpen: !s.mobileMenuOpen }));\n    const mobileGoTop = (e) => { if (e) e.preventDefault(); this.setState({ mobileMenuOpen: false }); window.scrollTo({ top: 0, behavior: 'smooth' }); };\n    const mobileGoToWhat = (e) => { if (e) e.preventDefault(); this.setState({ mobileMenuOpen: false }); setTimeout(() => { const el = document.getElementById('what-you-get'); if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' }); }, 60); };\n    const mobileGoToFaq = (e) => { if (e) e.preventDefault(); this.setState({ mobileMenuOpen: false }); setTimeout(() => { const el = document.getElementById('faq'); if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' }); }, 60); };\n    const mobileOpenContact = (e) => { this.setState({ mobileMenuOpen: false }); openContact(e); };\n    const closeContact = () => this.setState({ contactOpen: false });\n    const closeContactBackdrop = (e) => { if (e.target === e.currentTarget) this.setState({ contactOpen: false }); };\n    const stopProp = (e) => e.stopPropagation();\n    const goFeasibility = () => this.setState({ contactStep: 'feasibility' });\n    const goMessage = () => this.setState({ contactStep: 'message' });\n    const backToMenu = () => this.setState({ contactStep: 'menu' });\n    const submitFeasibility = (e) => {\n      e.preventDefault();\n      const form = e.target;\n      this.setState({ feasSubmitting: true, feasError: false });\n      this._submitToFormspree(form).then(res => {\n        if (res.ok) this.setState({ contactStep: 'done-feasibility', feasSubmitting: false });\n        else this.setState({ feasSubmitting: false, feasError: true });\n      }).catch(() => this.setState({ feasSubmitting: false, feasError: true }));\n    };\n    const submitMessage = (e) => {\n      e.preventDefault();\n      const form = e.target;\n      this.setState({ msgSubmitting: true, msgError: false });\n      this._submitToFormspree(form).then(res => {\n        if (res.ok) this.setState({ contactStep: 'done-message', msgSubmitting: false });\n        else this.setState({ msgSubmitting: false, msgError: true });\n      }).catch(() => this.setState({ msgSubmitting: false, msgError: true }));\n    };\n    const open = this.state.open;\n    const faqs = data.map((f, i) => ({\n      q: f.q,\n      a: f.a,\n      isOpen: i === open,\n      sign: i === open ? \"\\u2013\" : \"+\",\n      toggle: () => this.setState({ open: open === i ? -1 : i })\n    }));\n    return {\n      faqs,\n      aduMenuStyle,\n      navStyle,\n      navText,\n      logoBrownOpacity,\n      ctaStyle,\n      goTop: (e) => { if (e) e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); },\n      goToWhat: (e) => { if (e) e.preventDefault(); const el = document.getElementById('what-you-get'); if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' }); },\n      goToFaq: (e) => { if (e) e.preventDefault(); const el = document.getElementById('faq'); if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 80, behavior: 'smooth' }); },\n      aduEnter: () => { clearTimeout(this._aduT); this.setState({ aduOpen: true }); },\n      aduLeave: () => { clearTimeout(this._aduT); this._aduT = setTimeout(() => this.setState({ aduOpen: false }), 160); },\n      showPrices: this.props.showPrices ?? true,\n      showTrust: this.props.showTrust ?? true,\n      contactOpen: this.state.contactOpen,\n      contactStep,\n      isMenu,\n      isFeasibility,\n      isMessage,\n      isDone,\n      showBack,\n      feasSubmitting,\n      msgSubmitting,\n      feasError,\n      msgError,\n      feasSubmitLabel,\n      msgSubmitLabel,\n      openContact,\n      closeContact,\n      closeContactBackdrop,\n      stopProp,\n      goFeasibility,\n      goMessage,\n      backToMenu,\n      submitFeasibility,\n      submitMessage,\n      feasOwnOptions,\n      feasPropTypeOptions,\n      feasUnitOptions,\n      feasTimelineOptions,\n      msgProductOptions,\n      inputStyle,\n      inputStyleFull,\n      textareaStyle,\n      submitStyle,\n      backBtnStyle,\n      mobileMenuOpen: this.state.mobileMenuOpen,\n      toggleMobileMenu,\n      mobileGoTop,\n      mobileGoToWhat,\n      mobileGoToFaq,\n      mobileOpenContact\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
